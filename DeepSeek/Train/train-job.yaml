apiVersion: batch/v1
kind: Job
metadata:
  name: deepseek-grpo-train
  namespace: default
spec:
  template:
    metadata:
      annotations:
        # Enable GCS Fuse CSI Driver for reading/writing to GCS
        gke-gcsfuse/volumes: "true"
        # Optional: remove limits for better speed/memory handling
        gke-gcsfuse/cpu-limit: "0"
        gke-gcsfuse/memory-limit: "0"
        gke-gcsfuse/ephemeral-storage-limit: "0"
    spec:
      restartPolicy: OnFailure
      nodeSelector:
        # Match the taints/labels of the GPU node pool
        nvidia.com/gpu: "present"
      tolerations:
      - key: "nvidia.com/gpu"
        operator: "Equal"
        value: "present"
        effect: "NoSchedule"
        
      containers:
      - name: training-container
        # REPLACE with your built image from Artifact Registry
        image: gcr.io/your-project-id/deepseek-grpo:latest
        imagePullPolicy: Always
        
        command: ["/bin/bash", "-c"]
        # Executing torchrun with 8 workers for multi-GPU training (matching B200 count per node)
        args:
          - |
            torchrun --nproc_per_node=8 train_grpo.py \
              --model_name_or_path "deepseek-ai/DeepSeek-R1-Distill-Qwen-1.5B" \
              --dataset_path "/gcs/your-bucket-name/dataset.json" \
              --output_dir "/gcs/your-bucket-name/checkpoints" \
              --batch_size 16
              
        resources:
          limits:
            nvidia.com/gpu: 8 # Number of GPUs requested (Scale to 8 per node)
          requests:
            cpu: "16" # Scale CPU for B200
            memory: "64Gi"
            nvidia.com/gpu: 8

        volumeMounts:
        - name: gcs-fuse-mount
          mountPath: /gcs

      volumes:
      - name: gcs-fuse-mount
        csi:
          driver: gcsfuse.csi.storage.gke.io
          volumeAttributes:
            # REPLACE with your bucket name
            bucketName: your-bucket-name
            # implicit-dirs supports subfolders without strict index definition
            mountOptions: "implicit-dirs"
